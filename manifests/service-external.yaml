apiVersion: v1
kind: Service
metadata:
  name: globomantics-external
  namespace: globomantics
spec:
  type: NodePort               # Exposes it on each node IP
  selector:
    app: globomantics          # Matches pods with this label
  ports:
    - port: 80                 # Port inside the cluster
      targetPort: 80           # Port on the pods
      nodePort: 30081          # Port on your host machine (30000-32767)
